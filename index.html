<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoonify | Camera Effect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at top center, #1e293b 0%, #020617 100%);
        }
        
        .title-font {
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            margin-bottom: 1.5rem;
        }

        #webcam-video {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.5rem;
            transform: scaleX(-1); /* Espelhar a câmera */
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 50;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #f97316);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px -3px rgba(236, 72, 153, 0.5);
        }
        
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Ocultar barra de rolagem mas manter funcionamento */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .filter-option {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-option.active {
            background: rgba(236, 72, 153, 0.15);
            border: 2px solid #ec4899;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.3);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .live-indicator {
            position: relative;
        }
        
        .live-indicator::before {
            content: '';
            position: absolute;
            left: -4px;
            top: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-ring 2s infinite;
            z-index: -1;
        }
    </style>
</head>

<body class="p-4 md:p-6 pb-4">

    <!-- Filtro SVG Base para posterização -->
    <svg width="0" height="0" style="position: absolute; z-index: -1;">
        <defs>
            <filter id="cartoon-effect" color-interpolation-filters="sRGB">
                <!-- Reduz detalhes criando aspecto de pintura -->
                <feGaussianBlur stdDeviation="3.5" result="blur" />
                <!-- "Bloqueia" as cores simulando pintura color bloking -->
                <feComponentTransfer in="blur" result="posterized">
                    <feFuncR type="discrete" tableValues="0 0.15 0.3 0.45 0.6 0.75 0.9 1" />
                    <feFuncG type="discrete" tableValues="0 0.15 0.3 0.45 0.6 0.75 0.9 1" />
                    <feFuncB type="discrete" tableValues="0 0.15 0.3 0.45 0.6 0.75 0.9 1" />
                </feComponentTransfer>
                <!-- Retoca sombras -->
                <feColorMatrix type="matrix" values="1.2 0 0 0 -0.1  0 1.2 0 0 -0.1  0 0 1.2 0 -0.1  0 0 0 1 0" result="contrast" in="posterized" />
            </filter>
        </defs>
    </svg>

    <header class="max-w-6xl w-full mx-auto flex justify-between items-center mb-4 z-10 glass-panel px-6 py-4 rounded-2xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-pink-500 to-orange-400 rounded-2xl flex items-center justify-center font-bold text-white text-2xl shadow-lg shadow-pink-500/30">
                🎨
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight leading-none bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-orange-400 title-font">Cartoonify</h1>
                <p class="text-[11px] text-zinc-400 uppercase tracking-widest mt-1 font-bold">Studio Camera</p>
            </div>
        </div>
        <div id="live-badge" class="hidden px-4 py-2 rounded-full bg-green-500/10 text-green-400 text-xs font-bold border border-green-500/20 flex items-center gap-2 shadow-[0_0_15px_rgba(34,197,94,0.2)]">
            <div class="live-indicator w-2.5 h-2.5 rounded-full bg-green-500"></div>
            ON-AIR
        </div>
    </header>

    <main class="flex-1 w-full max-w-6xl mx-auto flex flex-col items-center min-h-0">
        
        <div class="video-container">
            <!-- Tela Inicial (Bem vindo/Aviso) -->
            <div id="setup-view" class="text-center absolute inset-0 flex flex-col items-center justify-center z-20">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center text-5xl mb-6 shadow-2xl border border-white/10 backdrop-blur-md">
                    📷
                </div>
                <h2 class="text-3xl font-bold mb-3 title-font">Pronto para criar?</h2>
                <p class="text-zinc-400 mb-8 max-w-md text-sm leading-relaxed">
                    Ligue a câmera e escolha embaixo entre os vários efeitos artísticos gerados direto pelo navegador!
                </p>
                <button onclick="startCamera()" class="btn btn-primary text-lg px-8 py-4">
                    <span class="text-xl">🚀</span> INICIAR CÂMERA
                </button>
            </div>

            <!-- Feed da Câmera Escondido & Saída renderizada com os Efeitos em Canvas -->
            <video id="webcam-video" autoplay playsinline></video>
            <canvas id="canvas-output" class="hidden"></canvas>

            <!-- Botão Salvar no Canto -->
            <div id="controls-view" class="controls hidden">
                <button onclick="takeSnapshot()" class="btn btn-primary text-xl px-6 py-4 shadow-2xl">
                    📸 TIRAR FOTO
                </button>
            </div>
        </div>

        <!-- Barra de Efeitos (Seletor) Injetado por Javascript -->
        <div id="filters-bar" class="hidden w-full max-w-6xl glass-panel p-3 rounded-2xl flex items-center gap-3 overflow-x-auto hide-scroll flex-shrink-0">
            <!-- Botões gerados por JS entrarão aqui -->
        </div>

    </main>

    <!-- Tela do Resultado (Foto Tirada) -->
    <div id="snapshot-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col items-center justify-center p-6 backdrop-blur-xl opacity-0 transition-opacity duration-300">
        <h3 class="text-3xl font-black mb-2 text-white text-center title-font bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-orange-400">Sua Foto de Estúdio!</h3>
        <p class="text-zinc-400 mb-8 text-sm">Prontinha para ser salva e compartilhada no WhatsApp/Insta.</p>
        
        <img id="snapshot-preview" class="max-h-[60vh] rounded-2xl shadow-[0_0_40px_rgba(236,72,153,0.3)] border border-white/20 mb-8 transform -scale-x-100" />
        
        <div class="flex gap-4 w-full max-w-sm">
            <button onclick="closeSnapshot()" class="btn btn-secondary flex-1 justify-center">VOLTAR</button>
            <a id="download-btn" class="btn btn-primary flex-1 justify-center text-center" download="cartoon_photo.png">
                BAIXAR ⬇️
            </a>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam-video');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d', { willReadFrequently: false });
        const setupView = document.getElementById('setup-view');
        const controlsView = document.getElementById('controls-view');
        const filtersBar = document.getElementById('filters-bar');
        const liveBadge = document.getElementById('live-badge');
        
        let stream;
        let animationFrameId;

        // O SEGREDO DOS EFEITOS: CSS Canvas Filters Turbinados pelo nosso Filtro SVG!
        const effects = [
            { id: 'normal',    name: 'Normal',    icon: '👤', css: 'none' },
            { id: 'cartoon',   name: 'Cartoon',   icon: '🎨', css: 'url(#cartoon-effect) saturate(220%) contrast(150%) brightness(120%) blur(0.5px)' },
            { id: 'pb',        name: 'Mangá P&B', icon: '📓', css: 'url(#cartoon-effect) grayscale(100%) contrast(200%) brightness(120%)' },
            { id: 'matrix',    name: 'Matrix G-1',icon: '💻', css: 'sepia(100%) hue-rotate(90deg) saturate(300%) contrast(150%) brightness(80%)' },
            { id: 'cyberpunk', name: 'Cyberpunk', icon: '🌃', css: 'url(#cartoon-effect) hue-rotate(140deg) saturate(300%) contrast(180%) brightness(110%)' },
            { id: 'popart',    name: 'Pop Art',   icon: '💥', css: 'url(#cartoon-effect) saturate(400%) contrast(200%) hue-rotate(45deg)' },
            { id: 'vintage',   name: 'Vintage HQ',icon: '📽️', css: 'sepia(80%) contrast(150%) saturate(140%) brightness(90%) blur(0.5px)' },
            { id: 'neon',      name: 'Radioativo',icon: '☢️', css: 'url(#cartoon-effect) hue-rotate(250deg) saturate(500%) contrast(180%) invert(10%)' },
            { id: 'warm',      name: 'Sépia Red', icon: '🌇', css: 'sepia(50%) saturate(200%) contrast(140%) hue-rotate(-20deg) brightness(1.1)' }
        ];

        let activeEffectIdx = 1; // Padrão: Cartoon

        // Constrói o Menu de Rolagem de Filtros Injetando o HTML Dinâmico
        function renderFilterUI() {
            filtersBar.innerHTML = '';
            effects.forEach((eff, idx) => {
                const btn = document.createElement('button');
                btn.className = `filter-option ${idx === activeEffectIdx ? 'active' : ''}`;
                btn.onclick = () => selectEffect(idx);
                // Conteúdo do botão
                btn.innerHTML = `
                    <span class="text-3xl drop-shadow-md">${eff.icon}</span>
                    <span class="text-xs font-extra-bold uppercase tracking-wide whitespace-nowrap opacity-90">${eff.name}</span>
                `;
                filtersBar.appendChild(btn);
            });
        }

        // Função chamada pra trocar de filtro
        function selectEffect(index) {
            activeEffectIdx = index;
            // Atualiza Destaque Visual do Menu
            const btns = filtersBar.querySelectorAll('.filter-option');
            btns.forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('active');
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); // Traz pro foco no celular
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        async function startCamera() {
            try {
                // Abre requisição de câmera com preferência FHD se dispoível
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user', 
                        width: { ideal: 1920 }, 
                        height: { ideal: 1080 } 
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                
                const startBtn = setupView.querySelector('button');
                startBtn.innerHTML = '<span class="animate-spin text-xl">⏳</span> CARREGANDO...';
                startBtn.classList.add('opacity-70', 'cursor-not-allowed');
                
                video.onloadedmetadata = () => {
                    video.play();
                    
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // Mostra as abas dos filmes/filtros e a câmera
                    setupView.classList.add('hidden');
                    canvas.classList.remove('hidden');
                    controlsView.classList.remove('hidden');
                    liveBadge.classList.remove('hidden');
                    filtersBar.classList.remove('hidden');
                    
                    renderFilterUI();
                    renderLoop();
                };
            } catch (err) {
                console.error("Erro:", err);
                alert("Sem acesso a câmera. Verifique as permissões de vídeo do seu navegador para este site!");
            }
        }

        // Gameloop: Desenha repetidamente os pixels da câmera no Canvas 2D + Mágica!
        function renderLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // O contexto usa o CSS do nosso Effect List (sendo URL p/ SVG ou Filters nativos)
                ctx.filter = effects[activeEffectIdx].css;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            animationFrameId = requestAnimationFrame(renderLoop);
        }

        // Click no botão "Tirar Foto"
        function takeSnapshot() {
            // Cria um painel branco e depois apaga pra simular "Flash"
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[200] transition-opacity duration-300 pointer-events-none opacity-100';
            document.body.appendChild(flash);
            
            setTimeout(() => {
                flash.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => flash.remove(), 300);
            }, 50);

            // Exporta EXCELENTE QUALIDADE com Filtros Pós Processados!
            const snapshotUrl = canvas.toDataURL('image/png', 1.0);
            
            const modal = document.getElementById('snapshot-modal');
            const preview = document.getElementById('snapshot-preview');
            const downloadBtn = document.getElementById('download-btn');
            
            preview.src = snapshotUrl;
            
            // Renomeia a foto na hora do Donwload de Acordo com o filtro Ex: foto_cyberpunk.png
            const filterName = effects[activeEffectIdx].name.toLowerCase().replace(/\s+/g, "_");
            downloadBtn.download = `foto_${filterName}.png`;
            downloadBtn.href = snapshotUrl;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('flex');
                modal.classList.replace('opacity-0', 'opacity-100');
            }, 10);
        }

        function closeSnapshot() {
            const modal = document.getElementById('snapshot-modal');
            modal.classList.replace('opacity-100', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }
    </script>
</body>

</html>

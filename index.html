<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Math Scanner AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050507; }
        .math-font { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glow-cyan { box-shadow: 0 0 30px rgba(6, 182, 212, 0.15); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #06b6d4; top: 0; animation: scan 3s ease-in-out infinite; z-index: 20; opacity: 0; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .loading-ring { border: 3px solid rgba(6, 182, 212, 0.1); border-top: 3px solid #06b6d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col p-4 md:p-10">

    <header class="max-w-6xl w-full mx-auto flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-600 rounded-lg flex items-center justify-center font-bold text-white text-xl">√</div>
            <h1 class="text-xl font-bold tracking-tighter">ANTIGRAVITY <span class="text-cyan-500">MATH_VISION</span></h1>
        </div>
        <div id="status" class="text-[10px] font-bold uppercase tracking-widest px-4 py-2 rounded-full border border-zinc-800 bg-zinc-900 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-red-500"></div> Hub Offline
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <!-- Scanner Area -->
        <div class="lg:col-span-7 space-y-6">
            <div class="glass rounded-[2rem] p-4 relative overflow-hidden glow-cyan group">
                <div id="webcam-container" class="rounded-2xl overflow-hidden bg-zinc-900 aspect-video flex items-center justify-center relative">
                    <p class="text-zinc-600 text-sm">Pronto para digitalizar...</p>
                    <div id="scan-bar" class="scan-line"></div>
                </div>
                
                <!-- Controls Over View -->
                <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-4 z-30">
                    <button onclick="init()" class="bg-zinc-100 text-black px-6 py-3 rounded-xl font-bold text-sm hover:scale-105 transition-transform active:scale-95 shadow-xl">
                        ATIVAR SENSOR
                    </button>
                    <button onclick="solve()" id="solve-btn" class="bg-cyan-600 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-cyan-500 transition-colors shadow-lg shadow-cyan-600/20 disabled:opacity-50">
                        ESCANEAR CONTA
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between px-4">
                <p class="text-xs text-zinc-500 uppercase tracking-widest">Suporte: Aritmética, Álgebra e Cálculo</p>
                <div class="relative">
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(this)">
                    <button onclick="document.getElementById('file-input').click()" class="text-xs text-cyan-500 hover:underline">OU ENVIAR IMAGEM</button>
                </div>
            </div>
        </div>

        <!-- Resolution Area -->
        <div class="lg:col-span-5 h-full">
            <div class="glass rounded-[2rem] p-8 h-full min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xs font-bold text-cyan-500 uppercase tracking-widest">Resolução I.A.</h3>
                    <div id="loading" class="hidden"><div class="loading-ring scale-50"></div></div>
                </div>

                <div id="res-content" class="flex-1 space-y-8">
                    <!-- Placeholder Info -->
                    <div class="space-y-4 py-20 text-center opacity-30">
                        <div class="text-4xl">∫</div>
                        <p class="text-sm">Posicione a conta matemátia em frente à câmera e clique em escanear.</p>
                    </div>
                </div>

                <div id="final-answer" class="mt-8 pt-8 border-t border-white/5 hidden">
                    <label class="text-[10px] uppercase text-zinc-500 font-bold tracking-widest">Resultado Final</label>
                    <div id="answer-val" class="text-4xl font-bold text-white math-font mt-2"></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        let webcam;
        const API_URL = "http://localhost:8000/solve";

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.onloadedmetadata = () => {
                   const canvas = document.createElement('canvas');
                   canvas.width = 640;
                   canvas.height = 480;
                   webcam = { video, canvas, ctx: canvas.getContext('2d') };
                   document.getElementById('webcam-container').innerHTML = '';
                   document.getElementById('webcam-container').appendChild(video);
                   video.style.width = '100%';
                   video.style.height = '100%';
                   video.style.objectFit = 'cover';
                };
            } catch (err) {
                alert("Erro ao iniciar câmera.");
            }
        }

        async function handleFile(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => processSolve(e.target.result);
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function solve() {
            if (!webcam) return alert("Ative o sensor primeiro!");
            webcam.ctx.drawImage(webcam.video, 0, 0, 640, 480);
            const dataURL = webcam.canvas.toDataURL('image/png');
            processSolve(dataURL);
        }

        async function processSolve(dataURL) {
            const btn = document.getElementById('solve-btn');
            const loader = document.getElementById('loading');
            const scanLine = document.getElementById('scan-bar');
            const content = document.getElementById('res-content');
            const foot = document.getElementById('final-answer');

            btn.disabled = true;
            loader.classList.remove('hidden');
            scanLine.style.opacity = '1';
            content.innerHTML = '<p class="text-cyan-500 animate-pulse text-sm mt-10 text-center">Analizando padrões matemáticos...</p>';
            foot.classList.add('hidden');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_data: dataURL })
                });
                const result = await res.json();

                if (result.status === 'success') {
                    renderResolution(result.data);
                } else {
                    content.innerHTML = `<p class="text-red-500 text-sm mt-10 text-center">${result.message}</p>`;
                }
            } catch (e) {
                content.innerHTML = '<p class="text-red-400 text-sm mt-10 text-center">Hub Offline. Inicie o app.py localmente.</p>';
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                scanLine.style.opacity = '0';
            }
        }

        function renderResolution(data) {
            const content = document.getElementById('res-content');
            const foot = document.getElementById('final-answer');
            const ans = document.getElementById('answer-val');

            content.innerHTML = `
                <div class="space-y-1">
                    <label class="text-[10px] uppercase text-zinc-500 font-bold tracking-widest">Problema Identificado</label>
                    <div class="text-2xl font-bold math-font text-cyan-400 tracking-tighter">${data.problem}</div>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] uppercase text-zinc-500 font-bold tracking-widest">Passo a Passo</label>
                    <div class="space-y-4">
                        ${data.steps.map((step, i) => `
                            <div class="flex gap-4">
                                <div class="w-6 h-6 rounded-full bg-zinc-800 text-[10px] font-bold flex items-center justify-center text-zinc-500 border border-white/5">${i+1}</div>
                                <div class="text-sm text-zinc-300 pt-1">${step}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            foot.classList.remove('hidden');
            ans.innerText = data.answer;
        }

        // Monitoring Connection
        setInterval(async () => {
            const badge = document.getElementById("status");
            try {
                const res = await fetch("http://localhost:8000/health");
                if (res.ok) {
                    badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-cyan-500"></div> HUB ONLINE';
                    badge.classList.replace('text-zinc-500', 'text-cyan-500');
                }
            } catch {
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500"></div> HUB OFFLINE';
            }
        }, 3000);
    </script>
</body>
</html>

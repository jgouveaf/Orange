<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Vision IoT | AI Controlled Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header Section -->
        <header>
            <div class="logo">
                <span class="icon">♠</span>
                <h1>POKER<span>VISION</span> <small>IoT</small></h1>
            </div>
            <div class="stats-panel">
                <div class="stat-item">
                    <label>FICHAS</label>
                    <span id="balance">1000</span>
                </div>
                <div class="stat-item">
                    <label>APOSTA ATUAL</label>
                    <span id="current-bet">0</span>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main>
            <div class="game-container">
                <div class="poker-table">
                    <div class="felt"></div>
                    
                    <!-- Dealer Section -->
                    <div class="dealer-area">
                        <div class="community-cards" id="community-cards">
                            <!-- Cards will be injected here -->
                        </div>
                        <div class="pot-display">
                            POT: $<span id="pot-value">0</span>
                        </div>
                    </div>

                    <!-- Player Section -->
                    <div class="player-area">
                        <div class="player-cards" id="player-cards">
                            <!-- Player cards will be injected here -->
                        </div>
                        <div class="player-status">
                            <h2 id="player-name">VOCÊ</h2>
                            <div class="status-indicator" id="player-action-indicator">AGUARDANDO...</div>
                        </div>
                    </div>
                </div>

                <!-- Side Panel: AI Vision & Controls -->
                <aside class="vision-panel">
                    <div class="cam-container">
                        <div id="video-container">
                            <!-- Webcam Feed Rendered Here -->
                        </div>
                        <div class="vision-overlay">
                            <div class="vignette"></div>
                            <div class="scanning-line"></div>
                            <div class="confidence-meter">
                                <span id="label-name">NADA</span>
                                <div class="progress-bar">
                                    <div id="confidence-bar" style="width: 0%"></div>
                                </div>
                                <span id="confidence-value">0%</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="ai-controls">
                        <h3>COMANDOS IA</h3>
                        <div class="gestures-info">
                            <div class="gesture-item">
                                <span class="gesture-icon">👍</span>
                                <span class="gesture-desc">APOSTAR ($10)</span>
                            </div>
                            <div class="gesture-item">
                                <span class="gesture-icon">✋</span>
                                <span class="gesture-desc">DESISTIR (FOLD)</span>
                            </div>
                            <div class="gesture-item">
                                <span class="gesture-icon">✌️</span>
                                <span class="gesture-desc">PASSAR (CHECK)</span>
                            </div>
                        </div>
                        
                        <div class="iot-status">
                            <div class="led-indicator" id="led-green"></div>
                            <span>STATUS IOT: ONLINE</span>
                        </div>

                        <button id="start-btn" class="primary-button">INICIAR CÂMERA</button>
                    </div>
                </aside>
            </div>
        </main>

        <!-- Notifications -->
        <div id="toast-container"></div>

        <!-- Setup Modal (for URL) -->
        <div id="setup-modal" class="modal">
            <div class="modal-content">
                <h2>Configuração Teachable Machine</h2>
                <p>Insira o link do seu modelo treinado:</p>
                <input type="text" id="model-url" placeholder="https://teachablemachine.withgoogle.com/models/XXXXX/">
                <button id="save-model-btn">SALVAR E COMEÇAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

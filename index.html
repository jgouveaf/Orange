<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch // Override | Protocolo Neon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- Main Game HUD -->
        <div id="hud">
            <div class="hud-top">
                <div class="hud-box health-box">
                    <label>SYNC STATUS</label>
                    <div class="bar-outer">
                        <div id="health-bar" class="bar-inner" style="width: 100%"></div>
                    </div>
                </div>
                <div class="hud-box override-box">
                    <label>OVERRIDE.EXE</label>
                    <div class="bar-outer">
                        <div id="energy-bar" class="bar-inner" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="hud-bottom">
                <div id="weapon-display">
                    <span id="weapon-name">STD_BUFFER</span>
                    <span id="ammo-count">∞</span>
                </div>
                <div id="score-display">000000</div>
            </div>
        </div>

        <!-- Scanline & Glitch Overlay -->
        <div class="overlay crt"></div>
        <div id="glitch-overlay"></div>

        <!-- Canvas Target -->
        <div id="canvas-target"></div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div class="title-container">
                <h1 class="glitch-text" data-text="GLITCH // OVERRIDE">GLITCH // OVERRIDE</h1>
                <p>PRESS [ENTER] TO BREACH THE NETWORK</p>
            </div>
            <div class="controls-hint">
                [W A S D] Move & Aim | [J] Fire | [K] Jump | [L] Pulsar | [SPACE] OVERRIDE
            </div>
        </div>
    </div>

    <!-- Antigravity Log -->
    <div id="iot-log">
        <div class="log-header">NET_STATUS: CONNECTED</div>
        <div id="log-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>

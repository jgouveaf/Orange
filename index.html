<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | IA Evolutiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-6 md:p-12">
    
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-white text-xl shadow-lg shadow-indigo-500/20">Σ</div>
            <h1 class="text-2xl font-bold tracking-tight">ANTIGRAVITY <span class="text-indigo-500">EVOLVE</span></h1>
        </div>
        <div id="status-badge" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-[10px] font-bold uppercase tracking-widest">
            Conectando...
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Módulo de Visão -->
        <div class="lg:col-span-7 space-y-6">
            <div class="glass-panel rounded-3xl p-4 overflow-hidden shadow-2xl">
                <div id="webcam-container" class="rounded-2xl overflow-hidden bg-zinc-900 aspect-video flex items-center justify-center border border-white/5 relative">
                    <p class="text-zinc-500 animate-pulse">Iniciando Sensor Óptico...</p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4">
                <button onclick="init()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-600/20">
                    ATIVAR WEBCAM
                </button>
            </div>
        </div>

        <!-- Módulo de Aprendizado -->
        <div class="lg:col-span-5 space-y-6">
            
            <!-- Painel de Ensino -->
            <div class="glass-panel rounded-3xl p-6 border-indigo-500/20 shadow-xl">
                <h3 class="text-indigo-400 font-bold text-xs uppercase tracking-[0.2em] mb-4">Módulo de Expansão</h3>
                <p class="text-zinc-400 text-sm mb-6">A IA não reconheceu? Ensine-a agora mesmo definindo um novo rótulo.</p>
                
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase">Novo Rótulo / Categoria</label>
                        <input type="text" id="new-label" placeholder="Ex: Raiz Quadrada" 
                               class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none transition-colors">
                    </div>
                    
                    <button onclick="teachAI()" id="teach-btn" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-zinc-200 transition-all flex items-center justify-center gap-2">
                        <span>CAPTURAR WEBCAM</span>
                    </button>

                    <div class="relative">
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileUpload(this)">
                        <button onclick="document.getElementById('file-input').click()" class="w-full bg-zinc-800 text-zinc-300 border border-zinc-700 font-bold py-4 rounded-xl hover:bg-zinc-700 transition-all flex items-center justify-center gap-2">
                            <span>UPLOAD DE ARQUIVO</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Dashboard de Conhecimento -->
            <div class="glass-panel rounded-3xl p-6">
                <h3 class="text-zinc-500 font-bold text-xs uppercase tracking-widest mb-4">Dataset Stats</h3>
                <div id="stats-list" class="space-y-3">
                    <div class="text-zinc-600 text-sm italic">Nenhum dado salvo no núcleo...</div>
                </div>
            </div>

            <!-- Histórico de Reconhecimento -->
            <div class="glass-panel rounded-3xl p-6 h-[180px] flex flex-col">
                <h3 class="text-zinc-500 font-bold text-xs uppercase tracking-widest mb-4">Live Recognition</h3>
                <div id="recognize-log" class="flex-1 overflow-y-auto font-mono text-[10px] space-y-1 text-zinc-500">
                    <div>Waiting for trigger...</div>
                </div>
            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script>
        const API_URL = "http://localhost:8000/save-example"; 
        let model, webcam, maxPredictions;
        const URL = "https://teachablemachine.withgoogle.com/models/k6R9uY-be/"; 

        async function init() {
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                webcam = new tmImage.Webcam(640, 480, true);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);

                const container = document.getElementById("webcam-container");
                container.innerHTML = "";
                container.appendChild(webcam.canvas);
                refreshStats();
            } catch (e) {
                alert("Erro ao acessar câmera.");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let topClass = ""; let topProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > topProb) {
                    topProb = prediction[i].probability;
                    topClass = prediction[i].className;
                }
            }

            if (topProb > 0.92 && topClass !== "Nada") {
                updateLog(topClass, topProb);
            }
        }

        async function teachAI() {
            let label = document.getElementById("new-label").value.trim();
            if (!label) label = "geral"; // Define rótulo padrão se estiver vazio

            if (!webcam) {
                alert("Ative a webcam primeiro!");
                return;
            }

            const btn = document.getElementById("teach-btn");
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const canvas = webcam.canvas;
            const dataURL = canvas.toDataURL("image/png");
            await sendImage(label, dataURL, btn, "CAPTURAR WEBCAM");
        }

        async function handleFileUpload(input) {
            let label = document.getElementById("new-label").value.trim();
            if (!label) label = "geral";

            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const dataURL = e.target.result;
                    await sendImage(label, dataURL, null, "");
                    input.value = "";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function sendImage(label, dataURL, btn, originalText) {
            try {
                // Tenta enviar para o Hub local. Se falhar, avisa sobre a necessidade do backend.
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ label: label, image_data: dataURL })
                });
                
                if (!res.ok) throw new Error("Erro no servidor");

                const data = await res.json();
                document.getElementById("new-label").value = "";
                refreshStats();
                addLog(`Sucesso: Salvo em '${label}'`);
            } catch (e) {
                alert("Falha ao salvar: O servidor Antigravity (app.py) não está rodando ou está inacessível.");
                console.error(e);
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            }
        }

        async function refreshStats() {
            try {
                const res = await fetch("http://localhost:8000/status");
                const data = await res.json();
                const list = document.getElementById("stats-list");
                list.innerHTML = "";
                
                for (const [cat, count] of Object.entries(data.dataset_stats)) {
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-zinc-900/50 p-3 rounded-xl border border-white/5">
                            <span class="text-xs font-semibold">${cat.toUpperCase()}</span>
                            <span class="text-xs bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded-md font-bold">${count} IMG</span>
                        </div>
                    `;
                }
                
                if (Object.keys(data.dataset_stats).length === 0) {
                    list.innerHTML = `<div class="text-zinc-600 text-sm italic">Nenhum dado salvo no núcleo...</div>`;
                }
            } catch (e) {}
        }

        function updateLog(label, prob) {
            const log = document.getElementById("recognize-log");
            if (log.childNodes.length > 20) log.removeChild(log.lastChild);
            const entry = document.createElement("div");
            entry.innerHTML = `<span class="text-indigo-900">[CORE]</span> Detecção: <b class="text-zinc-300">${label}</b> (${Math.round(prob*100)}%)`;
            log.prepend(entry);
        }

        // Backend Sync
        setInterval(async () => {
            const badge = document.getElementById("status-badge");
            try {
                const res = await fetch("http://localhost:8000/status");
                if (res.ok) {
                    badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-emerald-500"></div> HUB ONLINE';
                    badge.classList.remove("text-red-500");
                    badge.classList.add("text-emerald-500");
                }
            } catch {
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500"></div> HUB DESCONECTADO';
                badge.classList.add("text-red-500");
                badge.classList.remove("text-emerald-500");
            }
        }, 5000);
    </script>
</body>
</html>

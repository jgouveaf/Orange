<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoonify | Camera Effect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at top center, #1e293b 0%, #020617 100%);
        }
        
        .title-font {
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        #webcam-video {
            display: none;
        }

        #canvas-output {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.5rem;
            transform: scaleX(-1); /* Espelhar a câmera */
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 50;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 9999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #f97316);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px -3px rgba(236, 72, 153, 0.5);
        }
        
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .btn-secondary:active {
            transform: scale(0.95);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .live-indicator {
            position: relative;
        }
        
        .live-indicator::before {
            content: '';
            position: absolute;
            left: -4px;
            top: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-ring 2s infinite;
            z-index: -1;
        }
    </style>
</head>

<body class="p-4 md:p-6 pb-0">

    <!-- Filtro SVG para Efeito Cartoon -->
    <svg width="0" height="0" style="position: absolute; z-index: -1;">
        <defs>
            <filter id="cartoon-effect" color-interpolation-filters="sRGB">
                <!-- Suavização para remover detalhes/ruído -->
                <feGaussianBlur stdDeviation="3.5" result="blur" />
                
                <!-- Posterização reduzindo paleta de cores para criar blocos (estilo desenho animado) -->
                <feComponentTransfer in="blur" result="posterized">
                    <feFuncR type="discrete" tableValues="0 0.15 0.3 0.45 0.6 0.75 0.9 1" />
                    <feFuncG type="discrete" tableValues="0 0.15 0.3 0.45 0.6 0.75 0.9 1" />
                    <feFuncB type="discrete" tableValues="0 0.15 0.3 0.45 0.6 0.75 0.9 1" />
                </feComponentTransfer>
                
                <!-- Aumento do contraste básico dentro do SVG -->
                <feColorMatrix type="matrix" values="1.2 0 0 0 -0.1  0 1.2 0 0 -0.1  0 0 1.2 0 -0.1  0 0 0 1 0" result="contrast" in="posterized" />
            </filter>
        </defs>
    </svg>

    <header class="max-w-6xl w-full mx-auto flex justify-between items-center mb-6 z-10 glass-panel px-6 py-4 rounded-2xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-pink-500 to-orange-400 rounded-2xl flex items-center justify-center font-bold text-white text-2xl shadow-lg shadow-pink-500/30">
                🎨
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight leading-none bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-orange-400 title-font">Cartoonify</h1>
                <p class="text-[11px] text-zinc-400 uppercase tracking-widest mt-1 font-bold">Live Camera Effect</p>
            </div>
        </div>
        <div id="live-badge" class="hidden px-4 py-2 rounded-full bg-green-500/10 text-green-400 text-xs font-bold border border-green-500/20 flex items-center gap-2 shadow-[0_0_15px_rgba(34,197,94,0.2)]">
            <div class="live-indicator w-2.5 h-2.5 rounded-full bg-green-500"></div>
            ON-AIR
        </div>
    </header>

    <main class="flex-1 w-full max-w-6xl mx-auto flex flex-col items-center">
        <div class="video-container">
            <!-- Tela de Setup -->
            <div id="setup-view" class="text-center absolute inset-0 flex flex-col items-center justify-center z-20">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center text-5xl mb-6 shadow-2xl border border-white/10 backdrop-blur-md">
                    📷
                </div>
                <h2 class="text-3xl font-bold mb-3 title-font">Pronto para virar desenho?</h2>
                <p class="text-zinc-400 mb-8 max-w-md text-sm leading-relaxed">
                    Ative sua câmera para transformarmos seu rosto em um cartoon incrível com renderização de GPU em tempo real. Não precisa do CMD!
                </p>
                <button onclick="startCamera()" class="btn btn-primary text-lg px-8 py-4">
                    <span class="text-xl">🚀</span> INICIAR CÂMERA
                </button>
            </div>

            <!-- Vídeo original (escondido) e Canvas para processamento -->
            <video id="webcam-video" autoplay playsinline></video>
            <canvas id="canvas-output" class="hidden"></canvas>

            <!-- Controles Inferiores -->
            <div id="controls-view" class="controls hidden">
                <button onclick="toggleEffect()" id="effect-btn" class="btn btn-secondary">
                    <span class="text-xl">✨</span> Normal
                </button>
                <button onclick="takeSnapshot()" class="btn btn-primary">
                    <span class="text-xl">📸</span> FOTO
                </button>
            </div>
        </div>
        
        <!-- Modal que aparece após tirar a foto -->
        <div id="snapshot-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col items-center justify-center p-6 backdrop-blur-xl opacity-0 transition-opacity duration-300">
            <h3 class="text-3xl font-black mb-2 text-white text-center title-font bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-orange-400">Excelente Captura!</h3>
            <p class="text-zinc-400 mb-8 text-sm">Sua obra de arte está pronta para ser salva.</p>
            
            <!-- Imagem espelhada para corresponder ao que vemos na câmera -->
            <img id="snapshot-preview" class="max-h-[60vh] rounded-2xl shadow-[0_0_40px_rgba(236,72,153,0.3)] border border-white/20 mb-8 transform -scale-x-100" />
            
            <div class="flex gap-4 w-full max-w-sm">
                <button onclick="closeSnapshot()" class="btn btn-secondary flex-1 justify-center">Voltar</button>
                <a id="download-btn" class="btn btn-primary flex-1 justify-center text-center" download="cartoon_photo.png">
                    BAIXAR ⬇️
                </a>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('webcam-video');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d', { willReadFrequently: false });
        const setupView = document.getElementById('setup-view');
        const controlsView = document.getElementById('controls-view');
        const effectBtn = document.getElementById('effect-btn');
        const liveBadge = document.getElementById('live-badge');
        
        let stream;
        let isEffectActive = true;
        let animationFrameId;

        async function startCamera() {
            try {
                // Solicitar câmera ao usuário com boa qualidade
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user', 
                        width: { ideal: 1920 }, 
                        height: { ideal: 1080 } 
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                
                // Mudar estado do botão de setup para "Carregando"
                const startBtn = setupView.querySelector('button');
                startBtn.innerHTML = '<span class="animate-spin text-xl">⏳</span> INICIANDO...';
                startBtn.classList.add('opacity-70', 'cursor-not-allowed');
                
                // Dispara quando o vídeo consegue ler metadata(resolução da camera detectada)
                video.onloadedmetadata = () => {
                    video.play();
                    
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // Transita interface de setup para gravação live
                    setupView.classList.add('hidden');
                    canvas.classList.remove('hidden');
                    controlsView.classList.remove('hidden');
                    liveBadge.classList.remove('hidden');
                    
                    // Inicia o Paint Loop
                    renderLoop();
                };
            } catch (err) {
                console.error("Erro ao acessar a câmera:", err);
                alert("Não foi possível acessar a câmera. Verifique as permissões de acesso do navegador!");
            }
        }

        function renderLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                
                // A magia acontece aqui: Aplicar filtro CSS dinamicamente no Canvas
                if (isEffectActive) {
                    ctx.filter = 'url(#cartoon-effect) saturate(220%) contrast(150%) brightness(120%) blur(0.5px)';
                } else {
                    ctx.filter = 'none';
                }
                
                // Pinta o frame de vídeo atual para o canvas, com o filtro engatilhado
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            animationFrameId = requestAnimationFrame(renderLoop);
        }

        // Alterna entre modo Cartoon / Normal
        function toggleEffect() {
            isEffectActive = !isEffectActive;
            if (isEffectActive) {
                effectBtn.innerHTML = '<span class="text-xl">✨</span> Normal'; // Mostra opção oposta
            } else {
                effectBtn.innerHTML = '<span class="text-xl">✨</span> Cartoon';
            }
        }

        // Tira a foto a partir do que o Canvas renderizou e salva com os filtros corretos.
        function takeSnapshot() {
            // Efeito de Flash na UI
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[200] transition-opacity duration-300 pointer-events-none opacity-100';
            document.body.appendChild(flash);
            
            setTimeout(() => {
                flash.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => flash.remove(), 300);
            }, 50);

            // Exportar imagem
            const snapshotUrl = canvas.toDataURL('image/png', 1.0);
            
            const modal = document.getElementById('snapshot-modal');
            const preview = document.getElementById('snapshot-preview');
            const downloadBtn = document.getElementById('download-btn');
            
            preview.src = snapshotUrl;
            downloadBtn.href = snapshotUrl;
            
            // Transição de abertura da interface Modal
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('flex');
                modal.classList.replace('opacity-0', 'opacity-100');
            }, 10);
        }

        function closeSnapshot() {
            const modal = document.getElementById('snapshot-modal');
            modal.classList.replace('opacity-100', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }
    </script>
</body>

</html>

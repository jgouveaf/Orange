<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Hub | Vision Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .scanning { border-top: 2px solid #06b6d4; animation: scan 2s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-height-screen flex flex-col items-center p-8">
    
    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center font-bold text-black text-xl">A</div>
            <h1 class="text-2xl font-bold tracking-tight">ANTIGRAVITY <span class="text-cyan-500">HUB</span></h1>
        </div>
        <div id="conn-status" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800">
            <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-xs font-semibold tracking-widest uppercase">Offline</span>
        </div>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Video Card -->
        <div class="md:col-span-2 space-y-4">
            <div class="glass-panel rounded-3xl p-4 relative overflow-hidden group">
                <div id="webcam-container" class="rounded-2xl overflow-hidden bg-zinc-900 aspect-video flex items-center justify-center border border-white/5">
                    <p class="text-zinc-500">Aguardando ativação da câmera...</p>
                </div>
                <div class="absolute inset-0 pointer-events-none scanning opacity-0 group-hover:opacity-20"></div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="init()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">
                    ATIVAR SISTEMA DE VISÃO
                </button>
            </div>
        </div>

        <!-- Sidebar / Console -->
        <div class="space-y-6">
            <div class="glass-panel rounded-3xl p-6 h-[400px] flex flex-col">
                <h3 class="text-sm font-bold text-cyan-500 uppercase tracking-widest mb-4">Event Log</h3>
                <div id="log-content" class="flex-1 overflow-y-auto space-y-2 text-xs font-mono text-zinc-400">
                    <div class="text-zinc-600">Autenticando sessão Antigravity...</div>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-6">
                <h3 class="text-sm font-bold text-zinc-500 uppercase tracking-widest mb-2">Detecção Atual</h3>
                <div id="current-label" class="text-3xl font-bold">-</div>
                <div class="w-full bg-zinc-800 h-1 rounded-full mt-4 overflow-hidden">
                    <div id="confidence-bar" class="bg-cyan-500 h-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script>
        const API_URL = "/webhook";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            addLog("Iniciando carregamento do modelo...");
            
            // DICA: Substitua o link abaixo pela URL do seu modelo exportado do Teachable Machine
            const URL = "https://teachablemachine.withgoogle.com/models/k6R9uY-be/"; 

            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                webcam = new tmImage.Webcam(640, 480, true);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);

                const container = document.getElementById("webcam-container");
                container.innerHTML = "";
                container.appendChild(webcam.canvas);
                
                addLog("Câmera ativada. Monitorando gestos.");
            } catch (e) {
                addLog("Erro ao carregar modelo. Verifique a URL.");
                console.error(e);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let topClass = "";
            let topProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > topProb) {
                    topProb = prediction[i].probability;
                    topClass = prediction[i].className;
                }
            }

            document.getElementById("current-label").innerText = topClass.toUpperCase();
            document.getElementById("confidence-bar").style.width = (topProb * 100) + "%";

            // Enviar para o Antigravity se confiança > 90%
            if (topProb > 0.90 && topClass !== "Nada") {
                triggerAction(topClass, topProb);
            }
        }

        async function triggerAction(label, prob) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ label: label, confidence: prob })
                });
                const data = await response.json();
                
                if (data.status === "triggered") {
                    addLog(`[HUB] Ação detectada: ${label} (ID: ${data.event_id})`);
                }
            } catch (err) {
                console.error("Erro na comunicação com o Hub.");
            }
        }

        function addLog(msg) {
            const log = document.getElementById("log-content");
            const entry = document.createElement("div");
            entry.innerHTML = `<span class="text-zinc-600">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            log.prepend(entry);
        }

        // Monitoring Connection
        setInterval(async () => {
            const statusDiv = document.getElementById("conn-status");
            try {
                const res = await fetch("/health");
                if (res.ok) {
                    statusDiv.innerHTML = '<div class="w-2 h-2 rounded-full bg-cyan-500"></div><span class="text-xs font-semibold tracking-widest uppercase text-cyan-500">Online</span>';
                }
            } catch {
                statusDiv.innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div><span class="text-xs font-semibold tracking-widest uppercase text-red-500">Offline</span>';
            }
        }, 3000);
    </script>
</body>
</html>
